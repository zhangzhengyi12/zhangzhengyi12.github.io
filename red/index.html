<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="./js/jquery.min.js"></script>
  <script src="./js/flexible.js"></script>
  <link rel="stylesheet" href="./css/main.css">
  <script charset="utf-8"
    src="https://map.qq.com/api/js?v=2.exp&key=KRYKRYKRYKRYKRYKRY^^^^^&libraries=geometry,convertor"></script>
  <script src="https://cdn.bootcdn.net/ajax/libs/eruda/2.4.1/eruda.js"></script>
  <script>
    eruda.init();
  </script>
  <title>Document</title>
</head>

<body>
  <div id="getDis">获取距离</div>
  <!-- <script src="./js/main.js"></script> -->
  <script>
    $(function () {
      // 获取用户的经纬度
      const getLocation = (success, error) => {
        if (navigator.geolocation) {
          navigator.geolocation.getCurrentPosition(success, error);
        } else {
          error("浏览器不支持获取定位");
        }
      };

      $("#getDis").on("click", () => {
        getLocation(
          (pos) => {
            const {
              latitude,
              longitude
            } = pos.coords;
            const myLocation = new qq.maps.LatLng(latitude, longitude);
            const someTarget = new qq.maps.LatLng(120.76644, 30.759725);
            alert(latitude + ";" + longitude);
            console.log(
              Math.round(
                qq.maps.geometry.spherical.computeDistanceBetween(
                  myLocation,
                  someTarget
                ) * 10
              ) / 10
            );
          },
          (err) => {
            console.log(err);
          }
        );
      });
    });
  </script>
</body>

</html>
